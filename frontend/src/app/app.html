<article id="main-content">
    <router-outlet></router-outlet>
</article>

@if (appState.working() === true)
{
    <span class="loader"></span>
    <span class="visually-hidden">
        Derzeit werden Daten nachgeladen. Bitte haben Sie ein wenig Geduld.
    </span>
    <div style="position: fixed; top: 0px; left: 0px;">
        <span class="indicator" [ngClass]="{yellow: appState.classesState() === WorkflowState.Loading, green: appState.classesState() === WorkflowState.Loaded, red: appState.classesState() === WorkflowState.ErrorOccured}">C</span>
        <span class="indicator" [ngClass]="{yellow: appState.notebookState() === WorkflowState.Loading, green: appState.notebookState() === WorkflowState.Loaded, red: appState.notebookState() === WorkflowState.ErrorOccured}">N</span>
        <span class="indicator" [ngClass]="{yellow: appState.attributesState() === WorkflowState.Loading, green: appState.attributesState() === WorkflowState.Loaded, red: appState.attributesState() === WorkflowState.ErrorOccured}">A</span>
        <span class="indicator" [ngClass]="{yellow: appState.repositoryState() === WorkflowState.Loading, green: appState.repositoryState() === WorkflowState.Loaded, red: appState.repositoryState() === WorkflowState.ErrorOccured}">R</span>
        <span class="indicator" [ngClass]="{yellow: appState.objectGroupsState() === WorkflowState.Loading, green: appState.objectGroupsState() === WorkflowState.Loaded, red: appState.objectGroupsState() === WorkflowState.ErrorOccured}">O</span>
        <span class="indicator" [ngClass]="{yellow: appState.itemsState() === WorkflowState.Loading, green: appState.itemsState() === WorkflowState.Loaded, red: appState.itemsState() === WorkflowState.ErrorOccured}">I</span>
    </div>
}

@if (appState.errorPresent() === true) {
    <footer class="error">
        {{appState.errorMessage()}}
    </footer>
}
