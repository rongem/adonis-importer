<button class="error-sign" (click)="toggleVisibleText()" [ngClass]="{visibletext: visibleText}" aria-expanded="{{visibleText}}" aria-controls="error-desc">!</button>
<span class="visually-hidden">
    Diese Zeile enthält Daten, die Fehler beim Import erzeugen würden.
</span>
@if (visibleText) {
  <div id="error-desc" class="error position-absolute" tabindex="0" role="dialog" aria-label="Fehlerbeschreibung" (click)="visibleText = !visibleText" (keydown)="onErrorKeydown($event)">
    {{errorDescription()}}
  </div>
}
